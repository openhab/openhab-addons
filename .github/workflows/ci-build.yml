name: CI

on:
  push:
    branches:
      - 'main'
    paths-ignore:
      - '.github/**/*.md'
  pull_request:
    branches:
      - 'main'
    paths-ignore:
      - '.github/**/*.md'
  workflow_dispatch:

jobs:
  plan-shards:
    name: Calculate Build Tasks
    runs-on: ubuntu-24.04
    outputs:
      build_task_matrix: ${{ steps.set-matrix.outputs.build_task_matrix }}
      selected_addon: ${{ steps.set-matrix.outputs.selected_addon }}
      selected_parts: ${{ steps.set-matrix.outputs.selected_parts }}
    steps:
      - name: Checkout
        if: github.head_ref == ''
        uses: actions/checkout@v6

      - name: Checkout merge
        if: github.head_ref != ''
        uses: actions/checkout@v6
        with:
          ref: refs/pull/${{github.event.pull_request.number}}/merge

      # pinning to SHA to mitigate possible supply chain attacks
      - name: Get Changed Files
        if: github.event_name == 'pull_request'
        id: files
        uses: Ana06/get-changed-files@25f79e676e7ea1868813e21465014798211fad8c # v2.3.0
        with:
          format: 'csv'

      - name: Calculate Number of Build Tasks
        id: set-matrix
        env:
          CHANGED_FILES: ${{ steps.files.outputs.all }}
          DEFAULT_PARTS: '20'
        run: |
          python3 ./.github/scripts/calculate-build-tasks

  build:
    needs: plan-shards
    strategy:
      fail-fast: false
      matrix:
        java: [ '21' ]
        os: [ 'ubuntu-24.04' ]
        build_task: ${{ fromJSON(needs.plan-shards.outputs.build_task_matrix) }}
    name: Build (Java ${{ matrix.java }}, ${{ matrix.os }}, shard ${{ matrix.build_task.build_part }}/${{ needs.plan-shards.outputs.selected_parts }}, ${{ matrix.build_task.range_label }})
    runs-on: ${{ matrix.os }}
    # dynamic timeout: single-addon builds get lower timeout, full/build-all runs get 90min
    timeout-minutes: ${{ needs.plan-shards.outputs.selected_parts == '1' && 60 || 90 }}
    steps:
      - name: Checkout
        if: github.head_ref == ''
        uses: actions/checkout@v6

      - name: Checkout merge
        if: github.head_ref != ''
        uses: actions/checkout@v6
        with:
          ref: refs/pull/${{github.event.pull_request.number}}/merge

      - name: Set up Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.m2/repository
            !~/.m2/repository/org/openhab
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}

      - name: Register Problem Matchers
        if: ${{ matrix.java == '21' }}
        id: problem_matchers
        run: |
          echo "::add-matcher::.github/openhab-compile-problems.json"

      - name: Build
        id: build
        run: bash './.github/scripts/maven-build'
        env:
          MAVEN_BUILD_ADDON: ${{ needs.plan-shards.outputs.selected_addon }}
          MAVEN_BUILD_PART: ${{ matrix.build_task.build_part }}
          MAVEN_BUILD_PARTS: ${{ needs.plan-shards.outputs.selected_parts }}
          MAVEN_SHARD_ADDONS: ${{ matrix.build_task.shard_addons }}
          MAVEN_OPTS: >-
            -Xmx8g
            -Dmaven.wagon.http.retryHandler.count=5
            -Dmaven.wagon.httpconnectionManager.ttlSeconds=25
            -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn

      - name: Publish Shard Summary
        if: ${{ always() && ((steps.build.outcome == 'success') || (steps.build.outcome == 'failure')) && hashFiles('target/shard-summary.md') != '' }}
        run: |
          echo "## CI Build" >> $GITHUB_STEP_SUMMARY
          cat target/shard-summary.md >> $GITHUB_STEP_SUMMARY

      - name: Upload Build Log
        if: ${{ always() && ((steps.build.outcome == 'success') || (steps.build.outcome == 'failure')) }}
        uses: actions/upload-artifact@v7
        with:
          name: build-log-java-${{ matrix.java }}-${{ matrix.os }}-shard-${{ matrix.build_task.build_part }}
          path: build.log

      - name: Upload SAT Summary Report
        if: ${{ always() && ((steps.build.outcome == 'success') || (steps.build.outcome == 'failure')) && hashFiles('target/summary_report.html') != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: sat-summary-report-shard-${{ matrix.build_task.build_part }}
          path: target/summary_report.html

      - name: Report SAT Errors as Annotations
        if: ${{ matrix.java == '21' && always() && ((steps.build.outcome == 'success') || (steps.build.outcome == 'failure')) && hashFiles('**/checkstyle-result.xml') != '' }}
        uses: ghys/checkstyle-github-action@main
        with:
          title: CheckStyle Violations
          path: '**/checkstyle-result.xml'
          mode: inline

      # this will identify modifications to files under source control during the workflow run;
      # untracked files will be included as well!
      - name: Verify Changed Files
        id: verify-changed-files
        run: |
          set -o pipefail
          changed_files=$(echo -n "$(git diff --name-only HEAD && git ls-files --others --exclude-standard)"|tr '\n' ' ')
          echo "changed_files=$changed_files" >> $GITHUB_OUTPUT

      - name: Fail on Changed Files
        if: steps.verify-changed-files.outputs.changed_files != ''
        env:
          CHANGED_FILES: ${{ steps.verify-changed-files.outputs.changed_files }}
        run: |
          echo "::error::Files have changed: $CHANGED_FILES"
          exit 1
