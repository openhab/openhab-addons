name: CI

on:
  push:
    branches:
      - 'main'
    paths-ignore:
      - '.github/**/*.md'
  pull_request:
    branches:
      - 'main'
    paths-ignore:
      - '.github/**/*.md'
  workflow_dispatch:

jobs:
  plan-shards:
    name: Calculate Build Tasks
    runs-on: ubuntu-24.04
    outputs:
      build_task_matrix: ${{ steps.set-matrix.outputs.build_task_matrix }}
      selected_addon: ${{ steps.set-matrix.outputs.selected_addon }}
      selected_parts: ${{ steps.set-matrix.outputs.selected_parts }}
    steps:
      - name: Checkout
        if: github.head_ref == ''
        uses: actions/checkout@v6

      - name: Checkout merge
        if: github.head_ref != ''
        uses: actions/checkout@v6
        with:
          ref: refs/pull/${{github.event.pull_request.number}}/merge

      # pinning to SHA to mitigate possible supply chain attacks
      - name: Get Changed Files
        if: github.event_name == 'pull_request'
        id: files
        uses: Ana06/get-changed-files@25f79e676e7ea1868813e21465014798211fad8c # v2.3.0
        with:
          format: 'csv'

      - name: Calculate Number of Build Tasks
        id: set-matrix
        env:
          CHANGED_FILES: ${{ steps.files.outputs.all }}
          DEFAULT_PARTS: '20'
        run: |
          python3 ./.github/scripts/calculate-build-tasks

  build:
    needs: plan-shards
    strategy:
      fail-fast: false
      matrix:
        java: [ '21' ]
        os: [ 'ubuntu-24.04' ]
        build_task: ${{ fromJSON(needs.plan-shards.outputs.build_task_matrix) }}
    name: Build (Java ${{ matrix.java }}, ${{ matrix.os }}, shard ${{ matrix.build_task.build_part }}/${{ needs.plan-shards.outputs.selected_parts }}, ${{ matrix.build_task.range_label }})
    runs-on: ${{ matrix.os }}
    # Each shard is expected to take around 5-15 minutes
    timeout-minutes: 45
    steps:
      - name: Checkout
        if: github.head_ref == ''
        uses: actions/checkout@v6

      - name: Checkout merge
        if: github.head_ref != ''
        uses: actions/checkout@v6
        with:
          ref: refs/pull/${{github.event.pull_request.number}}/merge

      - name: Set up Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.m2/repository
            ~/.m2/openhab-schemas
            !~/.m2/repository/org/openhab
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}

      - name: Register Problem Matchers
        if: ${{ matrix.java == '21' }}
        id: problem_matchers
        run: |
          echo "::add-matcher::.github/openhab-compile-problems.json"

      - name: Build
        id: build
        run: bash './.github/scripts/maven-build'
        env:
          MAVEN_BUILD_ADDON: ${{ needs.plan-shards.outputs.selected_addon }}
          MAVEN_BUILD_PART: ${{ matrix.build_task.build_part }}
          MAVEN_BUILD_PARTS: ${{ needs.plan-shards.outputs.selected_parts }}
          MAVEN_SHARD_ADDONS: ${{ matrix.build_task.shard_addons }}
          MAVEN_OPTS: >-
            -Xmx8g
            -Dmaven.wagon.http.retryHandler.count=5
            -Dmaven.wagon.httpconnectionManager.ttlSeconds=25
            -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn

      - name: Upload Built openHAB JARs
        if: ${{ steps.build.outcome == 'success' && needs.plan-shards.outputs.selected_parts != '1' && runner.os == 'Linux' }}
        uses: actions/upload-artifact@v7
        with:
          name: openhab-jars-java-${{ matrix.java }}-shard-${{ matrix.build_task.build_part }}
          path: ~/.m2/repository/org/openhab
          retention-days: 1

      - name: Publish Shard Summary
        if: ${{ always() && ((steps.build.outcome == 'success') || (steps.build.outcome == 'failure')) && hashFiles('target/shard-summary.md') != '' }}
        run: |
          echo "## CI Build" >> $GITHUB_STEP_SUMMARY
          cat target/shard-summary.md >> $GITHUB_STEP_SUMMARY

      - name: Upload Build Log
        if: ${{ always() && ((steps.build.outcome == 'success') || (steps.build.outcome == 'failure')) }}
        uses: actions/upload-artifact@v7
        with:
          name: build-log-java-${{ matrix.java }}-${{ matrix.os }}-shard-${{ matrix.build_task.build_part }}
          path: build.log

      - name: Upload SAT Summary Report
        if: ${{ always() && ((steps.build.outcome == 'success') || (steps.build.outcome == 'failure')) && hashFiles('target/summary_report.html') != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: sat-summary-report-java-${{ matrix.java }}-${{ matrix.os }}-shard-${{ matrix.build_task.build_part }}
          path: target/summary_report.html

      - name: Upload SAT Merge XML
        if: ${{ steps.build.outcome == 'success' && needs.plan-shards.outputs.selected_parts != '1' && runner.os == 'Linux' && hashFiles('target/merge.xml') != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: sat-merge-xml-java-${{ matrix.java }}-${{ matrix.os }}-shard-${{ matrix.build_task.build_part }}
          path: target/merge.xml
          retention-days: 1

      - name: Report SAT Errors as Annotations
        if: ${{ matrix.java == '21' && always() && ((steps.build.outcome == 'success') || (steps.build.outcome == 'failure')) && hashFiles('**/checkstyle-result.xml') != '' }}
        uses: ghys/checkstyle-github-action@main
        with:
          title: CheckStyle Violations
          path: '**/checkstyle-result.xml'
          mode: inline

      # this will identify modifications to files under source control during the workflow run;
      # untracked files will be included as well!
      - name: Verify Changed Files
        id: verify-changed-files
        run: |
          set -o pipefail
          changed_files=$(echo -n "$(git diff --name-only HEAD && git ls-files --others --exclude-standard)"|tr '\n' ' ')
          echo "changed_files=$changed_files" >> $GITHUB_OUTPUT

      - name: Fail on Changed Files
        if: steps.verify-changed-files.outputs.changed_files != ''
        env:
          CHANGED_FILES: ${{ steps.verify-changed-files.outputs.changed_files }}
        run: |
          echo "::error::Files have changed: $CHANGED_FILES"
          exit 1

  build-features:
    needs: [ plan-shards, build ]
    # only run for full shard builds; single-addon PRs don't need Karaf features verification
    if: needs.plan-shards.outputs.selected_parts != '1'
    strategy:
      fail-fast: false
      matrix:
        java: [ '21' ]
        os: [ 'ubuntu-24.04' ]
    name: Build Features (Java ${{ matrix.java }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    steps:
      - name: Checkout
        if: github.head_ref == ''
        uses: actions/checkout@v6

      - name: Checkout merge
        if: github.head_ref != ''
        uses: actions/checkout@v6
        with:
          ref: refs/pull/${{github.event.pull_request.number}}/merge

      - name: Set up Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.m2/repository
            ~/.m2/openhab-schemas
            !~/.m2/repository/org/openhab
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}

      - name: Download Built openHAB JARs
        uses: actions/download-artifact@v7
        with:
          pattern: openhab-jars-java-${{ matrix.java }}-shard-*
          path: ~/.m2/repository/org/openhab
          merge-multiple: true

      - name: Build Features
        id: build
        run: './.github/scripts/maven-build'
        env:
          MAVEN_BUILD_FEATURES: 'true'
          MAVEN_OPTS: >-
            -Xmx8g
            -Dmaven.wagon.http.retryHandler.count=5
            -Dmaven.wagon.httpconnectionManager.ttlSeconds=25
            -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn

      - name: Upload Build Log
        if: ${{ always() && ((steps.build.outcome == 'success') || (steps.build.outcome == 'failure')) }}
        uses: actions/upload-artifact@v7
        with:
          name: build-log-java-${{ matrix.java }}-${{ matrix.os }}-features
          path: build.log

      - name: Upload SAT Merge XML
        if: ${{ always() && ((steps.build.outcome == 'success') || (steps.build.outcome == 'failure')) && hashFiles('target/merge.xml') != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: sat-merge-xml-java-${{ matrix.java }}-${{ matrix.os }}-features
          path: target/merge.xml
          retention-days: 1
  finalize:
    needs: [ plan-shards, build, build-features ]
    if: |
      always() &&
      needs.build.result == 'success' &&
      (needs.build-features.result == 'success' || needs.build-features.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        java: [ '21' ]
        os: [ 'ubuntu-24.04' ]
    name: Finalize (Java ${{ matrix.java }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}

      - name: Restore Maven Cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.m2/repository
            ~/.m2/openhab-schemas
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Download Build Logs
        uses: actions/download-artifact@v7
        with:
          pattern: build-log-java-${{ matrix.java }}-${{ matrix.os }}-*
          path: build-logs
          merge-multiple: false

      - name: Combine Build Logs
        run: python3 .github/scripts/combine-build-logs build-logs combined/build.log

      - name: Upload Combined Build Log
        uses: actions/upload-artifact@v7
        with:
          name: build-log-java-${{ matrix.java }}-${{ matrix.os }}
          path: combined/build.log

      - name: Download SAT Merge XMLs
        id: download-sat
        continue-on-error: true
        uses: actions/download-artifact@v7
        with:
          pattern: sat-merge-xml-java-${{ matrix.java }}-${{ matrix.os }}-*
          path: sat-merge-xmls
          merge-multiple: false

      - name: Merge SAT XMLs
        if: steps.download-sat.outcome == 'success'
        run: python3 .github/scripts/merge-sat-xmls sat-merge-xmls target/merge.xml

      - name: Generate SAT Summary Report
        if: steps.download-sat.outcome == 'success'
        run: |
          SAT_VER=$(./mvnw help:evaluate -Dexpression=sat.version -q -DforceStdout -N)
          ./mvnw -N --no-transfer-progress \
            org.openhab.tools.sat:sat-plugin:$SAT_VER:report \
            -Dreport.fail.on.error=false \
            -Dreport.fail.on.warning=false \
            -Dreport.fail.on.info=false \
            -Dreport.in.maven=false

      - name: Upload Combined SAT Report
        if: steps.download-sat.outcome == 'success' && hashFiles('target/summary_report.html') != ''
        uses: actions/upload-artifact@v7
        with:
          name: sat-summary-report-java-${{ matrix.java }}-${{ matrix.os }}
          path: target/summary_report.html
