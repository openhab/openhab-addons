channel-type.rachio.zone-fixed-runtime.description = Fixed runtime value returned by Rachio for this zone.
channel-type.rachio.zone-image-url.label = Image URL
channel-type.rachio.zone-image-url.description = URL for the zone picture/image.
channel-type.rachio.zone-image.label = Image
channel-type.rachio.zone-image.description = Zone picture as native openHAB image data.
channel-type.rachio.zone-last-watered-date.label = Last Watered Date
channel-type.rachio.zone-last-watered-date.description = Timestamp when this zone was last watered.
channel-type.rachio.zone-management-allowed-depletion.label = Management Allowed Depletion
channel-type.rachio.zone-management-allowed-depletion.description = Management allowed depletion value returned by Rachio for this zone.
channel-type.rachio.zone-max-runtime.label = Maximum Runtime
channel-type.rachio.zone-max-runtime.description = Maximum runtime value returned by Rachio for this zone.
channel-type.rachio.zone-moisture-level.label = Moisture Level
channel-type.rachio.zone-moisture-level.description = Command-only soil moisture adjustment input for zone/setMoistureLevel, in millimeters. Rachio does not return this value as readable zone state, so it may be UNDEF until a command is sent.
channel-type.rachio.zone-moisture-percent.label = Moisture Percent
channel-type.rachio.zone-moisture-percent.description = Command-only soil moisture adjustment input for zone/setMoisturePercent. Valid range is 0 to 1. Rachio does not return this value as readable zone state, so it may be UNDEF until a command is sent.
channel-type.rachio.zone-name.label = Name
channel-type.rachio.zone-name.description = Name of the zone as configured in the Rachio App.
channel-type.rachio.zone-number.label = Zone Number
channel-type.rachio.zone-number.description = Zone Number (1-16)
channel-type.rachio.zone-root-zone-depth.label = Root Zone Depth
channel-type.rachio.zone-root-zone-depth.description = Root zone depth value returned by Rachio for this zone.
channel-type.rachio.zone-run-total.label = Total Runtime
channel-type.rachio.zone-run-total.description = Total runtime of the zone.
channel-type.rachio.zone-run.label = Run Zone
channel-type.rachio.zone-run.description = ON: start watering, OFF: stop watering
channel-type.rachio.zone-runtime-no-multiplier.label = Runtime Without Multiplier
channel-type.rachio.zone-runtime-no-multiplier.description = Runtime without multiplier value returned by Rachio for this zone.
channel-type.rachio.zone-runtime.label = Runtime
channel-type.rachio.zone-runtime.description = Set > 0 to start the zone for the given number of seconds.
channel-type.rachio.zone-saturated-depth-of-water.label = Saturated Depth of Water
channel-type.rachio.zone-saturated-depth-of-water.description = Saturated depth of water value returned by Rachio for this zone.
channel-type.rachio.zone-schedule-data-modified.label = Schedule Data Modified
channel-type.rachio.zone-schedule-data-modified.description = ON when Rachio reports modified schedule data for this zone.
channel-type.rachio.zone-yard-area-square-feet.label = Yard Area
channel-type.rachio.zone-yard-area-square-feet.description = Yard area in square feet as returned by Rachio for this zone.
