# add-on

addon.miio.name = Xiaomi Wifi devices (Mi IO) Binding
addon.miio.description = Binding for Xiaomi wifi devices (Mi IO protocol) which are normally controlled by the mihome app like Mi Robot Vacuums, Yeelights, Humidifiers, Fans etc.

