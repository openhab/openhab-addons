# Thing types
thing-type.threedprinter.prusaprinter.label = Prusa Printer
thing-type.threedprinter.prusaprinter.description = A Prusa 3D printer running PrusaLink firmware.
thing-type.threedprinter.klipper.label = Klipper Printer
thing-type.threedprinter.klipper.description = A 3D printer running Klipper firmware, accessed via the Moonraker API.
thing-type.threedprinter.octoprint.label = OctoPrint Printer
thing-type.threedprinter.octoprint.description = A 3D printer managed by an OctoPrint server.

# Config parameters
thing-type.config.threedprinter.prusaprinter.hostname.label = Hostname / IP
thing-type.config.threedprinter.prusaprinter.hostname.description = Hostname or IP address of the Prusa printer.
thing-type.config.threedprinter.prusaprinter.port.label = Port
thing-type.config.threedprinter.prusaprinter.port.description = HTTP port of the PrusaLink web server.
thing-type.config.threedprinter.prusaprinter.apiKey.label = API Key
thing-type.config.threedprinter.prusaprinter.apiKey.description = PrusaLink API key found in the printer menu under Settings → Network → PrusaLink.
thing-type.config.threedprinter.prusaprinter.refreshInterval.label = Refresh Interval
thing-type.config.threedprinter.prusaprinter.refreshInterval.description = How often to poll the printer for status updates.

thing-type.config.threedprinter.klipper.hostname.label = Hostname / IP
thing-type.config.threedprinter.klipper.hostname.description = Hostname or IP address of the Moonraker server.
thing-type.config.threedprinter.klipper.port.label = Port
thing-type.config.threedprinter.klipper.port.description = Moonraker API port (default 7125).
thing-type.config.threedprinter.klipper.apiKey.label = API Key
thing-type.config.threedprinter.klipper.apiKey.description = Moonraker API key. Leave empty if no authentication is required.
thing-type.config.threedprinter.klipper.refreshInterval.label = Refresh Interval
thing-type.config.threedprinter.klipper.refreshInterval.description = How often to poll the printer for status updates.

thing-type.config.threedprinter.octoprint.hostname.label = Hostname / IP
thing-type.config.threedprinter.octoprint.hostname.description = Hostname or IP address of the OctoPrint server.
thing-type.config.threedprinter.octoprint.port.label = Port
thing-type.config.threedprinter.octoprint.port.description = OctoPrint HTTP port (default 5000).
thing-type.config.threedprinter.octoprint.apiKey.label = API Key
thing-type.config.threedprinter.octoprint.apiKey.description = OctoPrint API key found in OctoPrint Settings → API.
thing-type.config.threedprinter.octoprint.refreshInterval.label = Refresh Interval
thing-type.config.threedprinter.octoprint.refreshInterval.description = How often to poll the printer for status updates.

# Channel types
channel-type.threedprinter.printer-state.label = Printer State
channel-type.threedprinter.printer-state.description = Current operational state of the printer.
channel-type.threedprinter.job-name.label = Job Name
channel-type.threedprinter.job-name.description = Name of the currently loaded or active print job file.
channel-type.threedprinter.job-progress.label = Print Progress
channel-type.threedprinter.job-progress.description = Percentage of the current print job completed.
channel-type.threedprinter.time-elapsed.label = Time Elapsed
channel-type.threedprinter.time-elapsed.description = Time elapsed since the current print job started.
channel-type.threedprinter.time-remaining.label = Time Remaining
channel-type.threedprinter.time-remaining.description = Estimated time remaining for the current print job.
channel-type.threedprinter.nozzle-temperature.label = Nozzle Temperature
channel-type.threedprinter.nozzle-temperature.description = Current nozzle (hotend) temperature.
channel-type.threedprinter.nozzle-temperature-setpoint.label = Nozzle Temperature Setpoint
channel-type.threedprinter.nozzle-temperature-setpoint.description = Target nozzle temperature.
channel-type.threedprinter.bed-temperature.label = Bed Temperature
channel-type.threedprinter.bed-temperature.description = Current heated bed temperature.
channel-type.threedprinter.bed-temperature-setpoint.label = Bed Temperature Setpoint
channel-type.threedprinter.bed-temperature-setpoint.description = Target bed temperature.
channel-type.threedprinter.print-speed.label = Print Speed
channel-type.threedprinter.print-speed.description = Print speed percentage (100 = normal speed).
channel-type.threedprinter.fan-speed.label = Fan Speed
channel-type.threedprinter.fan-speed.description = Part-cooling fan speed percentage.
channel-type.threedprinter.pause-resume.label = Pause / Resume
channel-type.threedprinter.pause-resume.description = ON pauses the print, OFF resumes it.
channel-type.threedprinter.cancel.label = Cancel Print
channel-type.threedprinter.cancel.description = Send ON to cancel the current print job.

# Offline reasons
offline.conf-error-missing-hostname = The 'hostname' parameter must be configured.
offline.conf-error-missing-apikey = The 'apiKey' parameter must be configured.
offline.comm-error-unreachable = Unable to reach the printer. Check hostname, port, and network connectivity.
offline.comm-error-json = Received an unexpected response from the printer API.
