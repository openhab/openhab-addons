# add-on

addon.chatgpt.name = ChatGPT Binding
addon.chatgpt.description = This binding allows interaction with OpenAI's ChatGPT.

# thing types

thing-type.chatgpt.account.label = OpenAI Account
thing-type.chatgpt.account.description = Account at OpenAI that is used for accessing the ChatGPT API.

# thing types config

thing-type.config.chatgpt.account.apiKey.label = API Key
thing-type.config.chatgpt.account.apiKey.description = API key to access the account
thing-type.config.chatgpt.account.baseUrl.label = API Base URL
thing-type.config.chatgpt.account.baseUrl.description = The base URL of the OpenAI API service.
thing-type.config.chatgpt.account.baseUrl.option.https\://api.openai.com/v1 = https://api.openai.com/v1
thing-type.config.chatgpt.account.group.authentication.label = Authentication
thing-type.config.chatgpt.account.group.authentication.description = Authentication for connecting to OpenAI API.
thing-type.config.chatgpt.account.group.connection.label = Connection
thing-type.config.chatgpt.account.group.connection.description = Connection settings for the OpenAI API.
thing-type.config.chatgpt.account.group.hli.label = HLI Configuration
thing-type.config.chatgpt.account.group.hli.description = Configure HLI service.
thing-type.config.chatgpt.account.maxTokens.label = Max Tokens
thing-type.config.chatgpt.account.maxTokens.description = The maximum number of tokens that can be generated in the chat completion.
thing-type.config.chatgpt.account.maxToolCalls.label = Maximum Number of Tool Calls
thing-type.config.chatgpt.account.maxToolCalls.description = The maximum number of sequential tool calls to execute in a single HLI request.
thing-type.config.chatgpt.account.model.label = Model
thing-type.config.chatgpt.account.model.description = ID of the model to use.
thing-type.config.chatgpt.account.requestTimeout.label = Request Timeout
thing-type.config.chatgpt.account.requestTimeout.description = Timeout in seconds for chat API requests. Used as default for all channels.
thing-type.config.chatgpt.account.temperature.label = Temperature
thing-type.config.chatgpt.account.temperature.description = What sampling temperature to use, between 0 and 2. Higher values like 0.8 will make the output more random, while lower values like 0.2 will make it more focused and deterministic.
thing-type.config.chatgpt.account.topP.label = TopP
thing-type.config.chatgpt.account.topP.description = An alternative to sampling with temperature, called nucleus sampling, where the model considers the results of the tokens with top_p probability mass. So 0.1 means only the tokens comprising the top 10% probability mass are considered. We generally recommend altering this or temperature but not both.

# channel types

channel-type.chatgpt.chat.label = Chat
channel-type.chatgpt.chat.description = A chat session

# channel types config

channel-type.config.chatgpt.chat.maxTokens.label = Maximum Number of Tokens
channel-type.config.chatgpt.chat.maxTokens.description = The maximum number of tokens to generate in the completion.
channel-type.config.chatgpt.chat.model.label = Model
channel-type.config.chatgpt.chat.model.description = The model to be used for the responses
channel-type.config.chatgpt.chat.requestTimeout.label = Request Timeout
channel-type.config.chatgpt.chat.requestTimeout.description = Timeout in seconds for this channel. Overrides the thing-level timeout.
channel-type.config.chatgpt.chat.systemMessage.label = System Message
channel-type.config.chatgpt.chat.systemMessage.description = The system message helps set the behavior of the assistant.
channel-type.config.chatgpt.chat.temperature.label = Temperature
channel-type.config.chatgpt.chat.temperature.description = Higher values like 0.8 will make the output more random, while lower values like 0.2 will make it more focused and deterministic.
channel-type.config.chatgpt.chat.topP.label = TopP
channel-type.config.chatgpt.chat.topP.description = An alternative to sampling with temperature, called nucleus sampling, where the model considers the results of the tokens with top_p probability mass. So 0.1 means only the tokens comprising the top 10% probability mass are considered. We generally recommend altering this or temperature but not both.

# status messages

offline.configuration-error = No API key configured
offline.communication-error = Could not connect to OpenAI API
requestTimeout.configuration-error = Invalid requestTimeout specified

# human language interpreter

hli.error.missing-configuration = Cannot interpret due to missing configuration.
hli.error.technical-problem = Cannot interpret due to a technical problem.
