servlet.error.not-found = Endpoint not found: {0} {1}
servlet.error.authorization.missing-config-or-disable-enforce = Add authorization to endpoint config or disable enforceAuthentication in binding config
servlet.error.authorization.required = Authorization required
servlet.error.authorization.invalid-username-or-password = Invalid username or password
servlet.error.authorization.invalid-token = Invalid token
servlet.error.transformation.failed = Transformation returned no response for endpoint {0} {1}
