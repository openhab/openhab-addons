# add-on

addon.restify.name = RESTify Binding
addon.restify.description = Exposes configurable HTTP endpoints backed by transformations.

# add-on config

binding.config.restify.defaultBasic.label = Default Basic Authorization
binding.config.restify.defaultBasic.description = Default Basic authorization in format username:password, used when endpoint authorization is not configured.
binding.config.restify.defaultBearer.label = Default Bearer Authorization
binding.config.restify.defaultBearer.description = Default Bearer token used when endpoint authorization is not configured.
binding.config.restify.enforceAuthentication.label = Enforce Authentication
binding.config.restify.enforceAuthentication.description = Require authorization for all endpoints, even if endpoint-specific authorization is not configured.

# thing types

thing-type.restify.endpoint.label = RESTify Endpoint
thing-type.restify.endpoint.description = Configurable REST endpoint that returns the output of a transformation.

# thing types config

thing-type.config.restify.endpoint.authorizationType.label = Authorization Type
thing-type.config.restify.endpoint.authorizationType.description = Authorization required by this endpoint.
thing-type.config.restify.endpoint.authorizationType.option.NONE = None
thing-type.config.restify.endpoint.authorizationType.option.BASIC = Basic
thing-type.config.restify.endpoint.authorizationType.option.BEARER = Bearer
thing-type.config.restify.endpoint.contentType.label = Content Type
thing-type.config.restify.endpoint.contentType.description = MIME content type returned by this endpoint.
thing-type.config.restify.endpoint.method.label = HTTP Method
thing-type.config.restify.endpoint.method.description = HTTP method this endpoint accepts.
thing-type.config.restify.endpoint.method.option.GET = GET
thing-type.config.restify.endpoint.method.option.POST = POST
thing-type.config.restify.endpoint.method.option.PUT = PUT
thing-type.config.restify.endpoint.method.option.DELETE = DELETE
thing-type.config.restify.endpoint.password.label = Password
thing-type.config.restify.endpoint.password.description = Basic authorization password.
thing-type.config.restify.endpoint.path.label = Context Path
thing-type.config.restify.endpoint.path.description = Path of the endpoint. You can query it by http(s)://${oh}/restify/${path}
thing-type.config.restify.endpoint.token.label = Bearer Token
thing-type.config.restify.endpoint.token.description = Bearer authorization token.
thing-type.config.restify.endpoint.transformationPattern.label = Transformation Pattern
thing-type.config.restify.endpoint.transformationPattern.description = Transformation pattern that generates the response body.
thing-type.config.restify.endpoint.username.label = Username
thing-type.config.restify.endpoint.username.description = Basic authorization username.

thing-type.config.restify.endpoint.path.invalid = Context path must start with "/" (was: {0}).
thing-type.config.restify.endpoint.path.only-root = Context path "/" is not allowed. Use a dedicated endpoint path, for example "/hello-world".
thing-type.config.restify.endpoint.path.reserved-prefix = Context path must not start with "/_" (was: {0}).
thing-type.config.restify.endpoint.method.invalid = HTTP method is invalid.
thing-type.config.restify.endpoint.transformationPattern.invalid = Transformation pattern is invalid: {0}
thing-type.config.restify.endpoint.authorization.basic.invalid = Basic authorization requires username and password.
thing-type.config.restify.endpoint.authorization.bearer.invalid = Bearer authorization requires a token.
thing-type.config.restify.endpoint.endpoint.duplicate = Duplicate endpoint: method {0} with path "{1}" is already registered. Choose a unique method/path combination.

