# add-on

addon.map.name = MAP Transformation
addon.map.description = Transformiert die Eingabe, indem sie sie in einen anderen String abbildet.

profile.config.transform.MAP.function.label = Dateiname
profile.config.transform.MAP.function.description = Dateiname der Datei, die die Zuordnungsinformationen enthält. <br /><br /> Eine Inline-Zuordnung wird unterstützt, z. B. "|online\=ON;offline\=OFF". <br /><br /> Die Einträge der Inline-Zuordnung werden standardmäßig durch Semikolons ("<code>;</code>") voneinander getrennt. <br /> Um ein anderes Trennzeichen zu verwenden, beispielsweise ein Komma\: "<code>|?delimiter\=,;online\=ON,offline\=OFF</code>" <br /> Um "<code>?delimiter</code>" als tatsächlichen Zuordnungsschlüssel zu verwenden, darf dieser nicht am Anfang der Zuordnung stehen.
profile.config.transform.MAP.sourceFormat.label = State Format
profile.config.transform.MAP.sourceFormat.description = Wie der Status auf dem Channel vor der Umwandlung formatiert werden soll, z. B. %s oder %.1f °C (Standard ist %s).

# bundle config

profile-type.transform.MAP.label = MAP
