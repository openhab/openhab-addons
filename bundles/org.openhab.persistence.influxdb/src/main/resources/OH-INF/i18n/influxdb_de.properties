# add-on

addon.influxdb.name = InfluxDB Persistence
addon.influxdb.description = Dies ist das Persistence Add-on für InfluxDB.

# add-on config

persistence.config.influxdb.addCategoryTag.label = Kategorie-Tag hinzufügen
persistence.config.influxdb.addCategoryTag.description = Soll die Kategorie des Artikels als Tag "Kategorie" angegeben werden? Wenn keine Kategorie angegeben ist, wird "n/a" verwendet.
persistence.config.influxdb.addLabelTag.label = Label-Tag hinzufügen
persistence.config.influxdb.addLabelTag.description = Soll die Artikelbeschriftung als Tag "label" angegeben werden? Wenn keine Bezeichnung festgelegt ist, wird "n/a" verwendet.
persistence.config.influxdb.addTypeTag.label = Type-Tag hinzufügen
persistence.config.influxdb.addTypeTag.description = Sollte der Artikeltyp als Tag "Type" aufgenommen werden?
persistence.config.influxdb.db.label = Datenbank/Organisation
persistence.config.influxdb.db.description = Der Name der Datenbank (InfluxDB 1.0) oder der Organisation (InfluxDB 2.0).
persistence.config.influxdb.group.connection.label = Verbindung
persistence.config.influxdb.group.connection.description = Diese Gruppe definiert Verbindungsparameter.
persistence.config.influxdb.group.misc.label = Verschiedenes
persistence.config.influxdb.group.misc.description = Diese Gruppe definiert verschiedene Parameter.
persistence.config.influxdb.group.tags.label = Zusätzliche Tags
persistence.config.influxdb.group.tags.description = Diese Gruppe definiert zusätzliche Tags, die zu Ihren Messungen hinzugefügt werden können.
persistence.config.influxdb.password.label = Datenbank Passwort
persistence.config.influxdb.password.description = Datenbank-Passwort
persistence.config.influxdb.replaceUnderscore.label = Unterstrich ersetzen
persistence.config.influxdb.replaceUnderscore.description = Legt fest, ob Unterstriche "_" in Elementnamen durch einen Punkt "." ersetzt werden sollen (aus "test_item" wird "test.item"). Dies gilt nur für Messwertnamen, nicht für Tags. Es gilt auch für Alias-Namen.
persistence.config.influxdb.retentionPolicy.label = Retention-Policy/Bucket
persistence.config.influxdb.retentionPolicy.description = Der Name der Retention-Policy (InfluxDB 1.0) oder des Buckets (InfluxDB 2.0), in das die Daten geschrieben werden sollen.
persistence.config.influxdb.token.label = Authentifizierungstoken
persistence.config.influxdb.token.description = Das Token zur Authentifizierung bei der Datenbank (Alternative zu Benutzername/Passwort für InfluxDB 2.0).
persistence.config.influxdb.url.label = Datenbank-URL
persistence.config.influxdb.url.description = Die URL der Datenbank, z. B. http\://127.0.0.1\:8086
persistence.config.influxdb.user.label = Benutzername
persistence.config.influxdb.user.description = Datenbank-Benutzername
persistence.config.influxdb.version.label = Datenbankversion
persistence.config.influxdb.version.description = InfluxDB Version
persistence.config.influxdb.version.option.V1 = InfluxDB 1
persistence.config.influxdb.version.option.V2 = InfluxDB 2
