# add-on

addon.jsscripting.name = JavaScript Scripting
addon.jsscripting.description = Dies fügt eine JS (ECMAScript-2024) Skript-Engine hinzu.

# add-on config

automation.config.jsscripting.debuggerEnabled.label = Debugger aktivieren
automation.config.jsscripting.debuggerEnabled.description = Aktiviert die Unterstützung des Chrome-Debuggers für JavaScript. Dies ermöglicht das Verbinden beliebiger Debugger, die mit dem <a href\="https\://chromedevtools.github.io/devtools-protocol/">Chrome DevTools Protocol</a> kompatibel sind, wie etwa die Chrome-Entwicklertools oder Visual Studio Code.
automation.config.jsscripting.debuggerPort.label = Debugger Port
automation.config.jsscripting.debuggerPort.description = Der Port, an den der Debugger gebunden werden soll.
automation.config.jsscripting.dependencyTrackingEnabled.label = Dependency Tracking aktivieren
automation.config.jsscripting.dependencyTrackingEnabled.description = Dependency Tracking ermöglicht es Skripten, sich automatisch neu zu laden, sobald eine Abhängigkeit geändert wird. Dependency Tracking kann deaktiviert werden, wenn geteilte Bibliotheken bearbeitet oder aktualisiert werden sollen, ohne dass alle Skripte sofort neu laden. Beachte, dass sich diese Einstellung nur auf Skripte auswirkt, die nach der Änderung der Einstellung geladen werden.
automation.config.jsscripting.eventConversionEnabled.label = Event-Daten von Java zu JavaScript-Typen in Skript-Aktionen & Skript-Bedingungen konvertieren
automation.config.jsscripting.eventConversionEnabled.description = Die Konvertierung der Event-Daten von Java in JavaScript-Typen in Skript-Aktionen &amp; Skript-Bedingungen ermöglicht die Arbeit mit Event-Daten auf eine native JS-Art ohne spezielle Behandlung von Java-Typen.<br> Wenn diese Option aktiviert ist, sind die Event-Daten, welche in Skript-Aktionen &amp; Skript-Bedingungen verfügbar sind, sind alle JS-Typen und die gleichen wie in Regeln, die aus Skript-Dateien erstellt werden.<br> Bitte beachte, dass diese Option <strong>automatischen Import der openHAB JavaScript Bibliothek in Skript-Aktionen &amp; Skript-Bedingungen erfordert</strong>.
automation.config.jsscripting.group.debugger.label = Debugger Unterstützung
automation.config.jsscripting.group.environment.label = JavaScript Umgebung
automation.config.jsscripting.group.system.label = Systemverhalten
automation.config.jsscripting.injectionCachingEnabled.label = openHAB JavaScript Bibliothek cachen
automation.config.jsscripting.injectionCachingEnabled.description = Zwischenspeichern der mitgelieferten openHAB JavaScript-Bibliothek für optimale Performance.<br>Deaktiviere diese Option, um das Laden der Bibliothek aus dem lokalen Benutzerkonfigurationsverzeichnis "automation/js/node_modules" zu ermöglichen. Deaktivierung der Zwischenspeicherung kann die Ladezeiten des Skripts erhöhen, insbesondere auf weniger leistungsfähigen Systemen.
automation.config.jsscripting.injectionEnabledV2.label = Globale Variablen der Hilfsbibliothek importieren
automation.config.jsscripting.injectionEnabledV2.description = Importiere alle globalen Variablen der openHAB JavaScript Bibliothek für häufig genutzte Dienste wie z. B. Items, Things, Actions, usw... <br> Wenn diese Option deaktiviert ist, kann die openHAB JavaScript Bibliothek manuell mit <code>require('openhab')</code> importiert werden.
automation.config.jsscripting.injectionEnabledV2.option.3 = Automatisches Importieren überall, einschließlich Skript-Dateien und Transformationen
automation.config.jsscripting.injectionEnabledV2.option.2 = Automatisches Importieren in Skript-Aktionen, Skript-Bedingungen und Transformationen
automation.config.jsscripting.injectionEnabledV2.option.1 = Automatisches Importieren nur für Skript-Aktionen & Skript-Bedingungen (empfohlen)
automation.config.jsscripting.injectionEnabledV2.option.0 = Automatisches Importieren deaktivieren und stattdessen <code>require</code> verwenden
automation.config.jsscripting.lockAcquisitionTimeout.label = Timeout für Skript-Engine Sperrung
automation.config.jsscripting.lockAcquisitionTimeout.description = Die Skript-Engines dürfen vor der Ausführung eines Skripts nur von einen einzigen Thread gesperrt werden. Diese Einstellung bestimmt, wie viele Sekunden das System versuchen wird, die Sperre zu erlangen, bevor es aufgibt. Für lang laufende Skripte, welche schneller ausgelöst werden können als sie ausgeführt werden können, muss man möglicherweise einen höheren Wert einstellen.
automation.config.jsscripting.scriptConditionWrapperEnabled.label = Skript-Bedingungen in selbst-ausführende Funktionen (IIFE) wrappen
automation.config.jsscripting.scriptConditionWrapperEnabled.description = Skript-Bedingungen in selbst-ausführende Funktionen zu wrappen erlaubt die Verwendung von <code>let</code> und <code>const</code> Variablen-Deklarationen, sowie die Verwendung von <code>function</code> und <code>class</code> Deklarationen. Wenn diese Option aktiviert ist, müssen <code>return</code> Anweisungen verwendet werden, um <code>true</code> oder <code>false</code> zurückzugeben.
