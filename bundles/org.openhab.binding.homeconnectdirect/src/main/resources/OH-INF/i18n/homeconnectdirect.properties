# add-on

addon.homeconnectdirect.name = Home Connect Direct Binding
addon.homeconnectdirect.description = The binding integrates the Home Connect devices into openHAB. It connects to household appliances from brands such as Bosch and Siemens. The connection is established locally with the devices.

# add-on config

addon.config.homeconnectdirect.loginEnabled.label = Enforce Password Protection
addon.config.homeconnectdirect.loginEnabled.description = This configuration parameter enables you to activate or deactivate password protection for the console interface. When enabled, users must provide a password to access the console.
addon.config.homeconnectdirect.loginPassword.label = Password
addon.config.homeconnectdirect.loginPassword.description = Console password
addon.config.homeconnectdirect.messageQueueSize.label = Message Queue Size
addon.config.homeconnectdirect.messageQueueSize.description = This is the maximum size of the message queue per home appliance. It specifies the maximum number of messages that can be stored. The higher this value is, the more memory is used.

