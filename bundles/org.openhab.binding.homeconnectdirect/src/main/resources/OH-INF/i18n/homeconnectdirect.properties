channel-type.homeconnectdirect.remaining-channel.label = Remaining
channel-type.homeconnectdirect.remaining-channel.description = This display shows a countdown indicating the time remaining until a specific maintenance or cleaning task is due. The countdown updates dynamically, providing a clear and convenient way to monitor upcoming actions.
channel-type.homeconnectdirect.remaining-program-time-channel.label = Remaining Program Time
channel-type.homeconnectdirect.remaining-program-time-channel.description = The remaining program time.
