channel-type.homeconnectdirect.washer-idos-active-channel.description = Whether i-Dos is enabled for a washing program.
channel-type.homeconnectdirect.washer-idos-fill-level-poor-channel.label = i-Dos Fill Level Poor
channel-type.homeconnectdirect.washer-idos-fill-level-poor-channel.description = Indicates whether the i-Dos is almost empty.
channel-type.homeconnectdirect.washer-less-ironing-channel.label = Less Ironing
channel-type.homeconnectdirect.washer-less-ironing-channel.description = Reduces spin speed and tumbles laundry gently after the cycle to minimize creasing and simplify ironing.
channel-type.homeconnectdirect.washer-prewash-channel.label = Prewash
channel-type.homeconnectdirect.washer-prewash-channel.description = Adds a prewash cycle to the washing program to treat heavily soiled laundry before the main wash.
channel-type.homeconnectdirect.washer-rinse-hold-channel.label = Rinse Hold
channel-type.homeconnectdirect.washer-rinse-hold-channel.description = Stops the washing cycle before the final spin, keeping the laundry in the last rinse water to prevent creasing.
channel-type.homeconnectdirect.washer-rinse-plus-channel.label = Rinse Plus
channel-type.homeconnectdirect.washer-rinse-plus-channel.description = Allows the selection of additional rinse cycles at the end of the program to ensure the complete removal of detergent residues.
channel-type.homeconnectdirect.washer-silent-wash-channel.label = Silent Wash
channel-type.homeconnectdirect.washer-silent-wash-channel.description = Reduces noise by omitting intermediate spin cycles and lowering the final spin speed, ideal for operation during nighttime.
channel-type.homeconnectdirect.washer-soak-channel.label = Soak
channel-type.homeconnectdirect.washer-soak-channel.description = Adds an immersion phase before the wash cycle to loosen stubborn dirt and stains from heavily soiled laundry.
channel-type.homeconnectdirect.washer-speed-perfect-channel.label = SpeedPerfect / varioSpeed
channel-type.homeconnectdirect.washer-speed-perfect-channel.description = Reduces the program duration by increasing energy consumption and mechanical action. Does not affect the final spin speed.
channel-type.homeconnectdirect.washer-spin-speed-channel.label = Spin Speed
channel-type.homeconnectdirect.washer-spin-speed-channel.description = The spin speed of the washing program.
channel-type.homeconnectdirect.washer-stains-channel.label = Stains
channel-type.homeconnectdirect.washer-stains-channel.description = Optimizes the wash cycle and water temperature to target and remove specific types of stains like grass, oil, or red wine.
channel-type.homeconnectdirect.washer-temperature-channel.label = Washing Program Temperature
channel-type.homeconnectdirect.washer-temperature-channel.description = The temperature of the washing program.
channel-type.homeconnectdirect.washer-water-plus-channel.label = Water Plus
channel-type.homeconnectdirect.washer-water-plus-channel.description = Increases the water level and/or adds an additional rinse cycle to the washing program for improved rinsing results.
channel-type.homeconnectdirect.water-tank-empty-channel.label = Water Tank Empty
channel-type.homeconnectdirect.water-tank-empty-channel.description = Indicates when the coffee machine's water tank is empty.
channel-type.homeconnectdirect.water-tank-nearly-empty-channel.label = Water Tank Nearly Empty
channel-type.homeconnectdirect.water-tank-nearly-empty-channel.description = Indicates when the coffee machine's water tank is almost empty.

