# add-on

addon.httphook.name = HTTP Hook
addon.httphook.description = Exposes configurable HTTP endpoints backed by transformations.

# add-on config

binding.config.httphook.defaultBasic.label = Default Basic Authorization
binding.config.httphook.defaultBasic.description = Default Basic authorization in format username:password, used when endpoint authorization is not configured.
binding.config.httphook.defaultBearer.label = Default Bearer Authorization
binding.config.httphook.defaultBearer.description = Default Bearer token used when endpoint authorization is not configured.
binding.config.httphook.enforceAuthentication.label = Enforce Authentication
binding.config.httphook.enforceAuthentication.description = Require authorization for all endpoints, even if endpoint-specific authorization is not configured.

# thing types

thing-type.httphook.endpoint.label = HTTP Hook Endpoint
thing-type.httphook.endpoint.description = Configurable HTTP hook that returns the output of response channel transformations.

# channel types

channel-type.httphook.response.label = Response
channel-type.httphook.response.description = HTTP response generated by a transformation.

# channel types config

channel-type.config.httphook.response.contentType.label = Content Type
channel-type.config.httphook.response.contentType.description = MIME content type returned by this response channel.
channel-type.config.httphook.response.method.label = HTTP Method
channel-type.config.httphook.response.method.description = HTTP method this response channel accepts.
channel-type.config.httphook.response.method.option.GET = GET
channel-type.config.httphook.response.method.option.POST = POST
channel-type.config.httphook.response.method.option.PUT = PUT
channel-type.config.httphook.response.method.option.DELETE = DELETE
channel-type.config.httphook.response.transformationPattern.label = Transformation Pattern
channel-type.config.httphook.response.transformationPattern.description = Transformation pattern that generates the response body.
channel-type.config.httphook.response.method.invalid = HTTP method is invalid.
channel-type.config.httphook.response.transformationPattern.invalid = Transformation pattern is invalid: {0}

# thing types config

thing-type.config.httphook.endpoint.authorizationType.label = Authorization Type
thing-type.config.httphook.endpoint.authorizationType.description = Authorization required by this endpoint.
thing-type.config.httphook.endpoint.authorizationType.option.NONE = None
thing-type.config.httphook.endpoint.authorizationType.option.BASIC = Basic
thing-type.config.httphook.endpoint.authorizationType.option.BEARER = Bearer
thing-type.config.httphook.endpoint.password.label = Password
thing-type.config.httphook.endpoint.password.description = Basic authorization password.
thing-type.config.httphook.endpoint.token.label = Bearer Token
thing-type.config.httphook.endpoint.token.description = Bearer authorization token.
thing-type.config.httphook.endpoint.username.label = Username
thing-type.config.httphook.endpoint.username.description = Basic authorization username.

thing-type.config.httphook.endpoint.channel.missing = Add at least one response channel.
thing-type.config.httphook.endpoint.authorization.basic.invalid = Basic authorization requires username and password.
thing-type.config.httphook.endpoint.authorization.bearer.invalid = Bearer authorization requires a token.
thing-type.config.httphook.endpoint.endpoint.duplicate = Duplicate endpoint: method {0} with path "{1}" is already registered. Check the Thing and response channel ids.

# servlet error messages

servlet.error.not-found = Endpoint not found: {0} {1}
servlet.error.authorization.missing-config-or-disable-enforce = Add authorization to endpoint config or disable enforceAuthentication in binding config
servlet.error.authorization.required = Authorization required
servlet.error.authorization.invalid-username-or-password = Invalid username or password
servlet.error.authorization.invalid-token = Invalid token
servlet.error.transformation.failed = Transformation returned no response for endpoint {0} {1}
