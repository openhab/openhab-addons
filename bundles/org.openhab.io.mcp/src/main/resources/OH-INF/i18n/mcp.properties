# add-on

addon.mcp.name = Model Context Protocol (MCP) Server
addon.mcp.description = Exposes openHAB to AI assistants via the Model Context Protocol, enabling semantic understanding and control of the smart home.

# add-on config

io.config.mcp.enableFullApiAccess.label = Enable Full REST API Access
io.config.mcp.enableFullApiAccess.description = When enabled, the agent gains access to three meta-tools (list_api_endpoints, describe_api_endpoint, call_api) that allow invocation of any openHAB REST endpoint - including destructive operations like deleting items or modifying service configs. The agent's permissions mirror your user. Only enable if you want the agent to have full parity with the REST API. The meta-tools forward the caller's bearer token to <code>/rest/*</code>, so the token's user must have the rights needed for the endpoints the agent calls.
io.config.mcp.enableScripting.label = Enable JavaScript Scripting
io.config.mcp.enableScripting.description = When enabled, the agent can include JavaScript snippets as rule actions or conditions (<code>type: "script"</code>) and gains an <code>execute_script</code> tool that runs JS immediately against openHAB's script engine - useful for dry-running a script before adding it to a scheduled rule. Scripts have the same full system access as any openHAB script (every item, HTTP requests, Exec, OSGi services, rule creation). Requires the <code>openhab-automation-jsscripting</code> add-on.
io.config.mcp.enableLoggingAccess.label = Enable Diagnostic Logging Tools
io.config.mcp.enableLoggingAccess.description = When enabled, the agent gains two tools (<code>get_logs</code> and <code>manage_log_level</code> with actions <code>get</code>/<code>set</code>) for reading recent log entries and adjusting logger verbosity to troubleshoot bindings, rules, or things. Log level changes are sent through the openHAB REST API and require the caller's bearer token to have <strong>administrator</strong> scope; log reads only require this flag to be on. Verbosity bumps auto-revert after 30 minutes by default so DEBUG won't be left on by accident.
io.config.mcp.enableUiDesign.label = Enable Main UI Design Tools
io.config.mcp.enableUiDesign.description = When enabled, the agent gains five tools (<code>list_widgets</code>, <code>describe_widget</code>, <code>get_page_skeleton</code>, <code>manage_ui_component</code>, <code>validate_ui_component</code>) for creating, modifying, and deleting Main UI pages and custom widgets. The tools ship with a curated widget catalog and an embedded reference for the expression language (<code>=items.X.state</code>), action grammar, visibility rules, and slot conventions so the agent produces valid YAML rather than hallucinating component names or prop keys. CRUD writes go through the openHAB REST API at <code>/rest/ui/components/</code> and require the caller's bearer token to have <strong>administrator</strong> scope; reads are gated by this flag alone.
io.config.mcp.enableStaticAssets.label = Enable Static Asset Management
io.config.mcp.enableStaticAssets.description = When enabled, the agent gains <code>manage_static_asset</code> for listing, reading, uploading, and deleting files in <code>$OPENHAB_CONF/html</code> (the folder served at <code>/static/*</code> and used for plan-page backgrounds, custom widget icons, CSS overrides, etc.). Useful alongside <code>enableUiDesign</code> so the agent can upload a floor plan and then reference it from a new plan page in the same conversation. Writes go directly to disk &mdash; there is no REST API to gate this &mdash; so the bundle enforces <strong>administrator</strong> scope itself by probing an admin-gated REST endpoint with the session's bearer token before each call. Filenames are sanitized (including symlinks pointing outside the root), extensions are whitelisted, and uploads are capped at 10 MB per call. Note that <code>.html</code>, <code>.htm</code>, <code>.svg</code>, and <code>.js</code> files served from <code>/static/</code> execute in the browser, so an agent that writes those becomes an XSS vector against your Main UI; the tool description warns about this but the operator should treat this flag like <code>enableScripting</code>.
io.config.mcp.enabled.label = Enable MCP Server
io.config.mcp.enabled.description = Enable or disable the MCP server endpoint.
io.config.mcp.exposeUntaggedItems.label = Expose Untagged Items
io.config.mcp.exposeUntaggedItems.description = Whether to include items that are not part of the semantic model in search results.
io.config.mcp.maxItemsPerPage.label = Maximum Items Per Page
io.config.mcp.maxItemsPerPage.description = Maximum number of items returned per page in paginated tool responses.
io.config.mcp.registerCloudWebhook.label = Register openHAB Cloud Webhook
io.config.mcp.registerCloudWebhook.description = When enabled, registers the <code>/mcp</code> endpoint with the openHAB Cloud service so remote MCP clients (Claude Desktop, ChatGPT, etc.) can reach this server via a stable <code>https://myopenhab.org/api/hooks/&lt;uuid&gt;</code> URL - no port forwarding or reverse proxy needed. Requires the openHAB Cloud add-on to be installed and connected to myopenhab.org.
io.config.mcp.resourceCoalesceMs.label = Resource Notification Coalesce Window
io.config.mcp.resourceCoalesceMs.description = Minimum milliseconds between notifications/resources/updated notifications for the same resource URI. Prevents flooding for chatty items (power meters, CPU load). Set to 0 to disable.
io.config.mcp.webhookUrl.label = Cloud Webhook URL
io.config.mcp.webhookUrl.description = Public URL assigned by openHAB Cloud once the webhook is registered. Copy this into your remote MCP client (Claude Desktop, ChatGPT, etc.) as the MCP server address. Empty when the Cloud webhook is disabled or the Cloud service isn't connected.
