# add-on

addon.mcp.name = Model Context Protocol (MCP) Server
addon.mcp.description = Macht openHAB über das Model Context Protocol für KI-Assistenten zugänglich und ermöglicht semantisches Verständnis und Steuerung des Smart Homes.

# add-on config

io.config.mcp.enableFullApiAccess.label = Vollständigen REST-API-Zugriff aktivieren
io.config.mcp.enableFullApiAccess.description = Wenn aktiviert, erhält der Agent Zugriff auf drei Meta-Tools (list_api_endpoints, describe_api_endpoint, call_api), die den Aufruf jedes beliebigen openHAB-REST-Endpunkts ermöglichen – einschließlich destruktiver Operationen wie dem Löschen von Items oder dem Ändern von Dienstkonfigurationen. Die Berechtigungen des Agenten entsprechen denen Ihres Benutzers. Nur aktivieren, wenn der Agent volle Parität mit der REST-API haben soll. Die Meta-Tools leiten das Bearer-Token des Aufrufers an <code>/rest/*</code> weiter, daher muss der Benutzer des Tokens über die für die aufgerufenen Endpunkte erforderlichen Rechte verfügen.
io.config.mcp.enableScripting.label = JavaScript-Scripting aktivieren
io.config.mcp.enableScripting.description = Wenn aktiviert, kann der Agent JavaScript-Snippets als Regelaktionen oder -bedingungen (<code>type\: "script"</code>) einfügen und erhält ein <code>execute_script</code>-Tool, das JS sofort gegen die Skript-Engine von openHAB ausführt – nützlich, um ein Skript testweise auszuführen, bevor es zu einer geplanten Regel hinzugefügt wird. Skripte haben denselben vollen Systemzugriff wie jedes openHAB-Skript (jedes Item, HTTP-Anfragen, Exec, OSGi-Dienste, Regelerstellung). Erfordert das Add-on <code>openhab-automation-jsscripting</code>.
io.config.mcp.enableLoggingAccess.label = Diagnose-Logging-Tools aktivieren
io.config.mcp.enableLoggingAccess.description = Wenn aktiviert, erhält der Agent zwei Tools (<code>get_logs</code> und <code>manage_log_level</code> mit den Aktionen <code>get</code>/<code>set</code>) zum Lesen aktueller Logeinträge und zum Anpassen der Logger-Ausführlichkeit zur Fehlersuche bei Bindings, Regeln oder Things. Änderungen des Log-Levels werden über die openHAB-REST-API gesendet und erfordern, dass das Bearer-Token des Aufrufers über den Berechtigungsumfang <strong>Administrator</strong> verfügt; Log-Lesevorgänge erfordern lediglich diese aktivierte Option. Erhöhungen des Log-Levels werden standardmäßig nach 30 Minuten automatisch zurückgesetzt, damit DEBUG nicht versehentlich dauerhaft aktiv bleibt.
io.config.mcp.enableUiDesign.label = Main-UI-Design-Tools aktivieren
io.config.mcp.enableUiDesign.description = Wenn aktiviert, erhält der Agent fünf Tools (<code>list_widgets</code>, <code>describe_widget</code>, <code>get_page_skeleton</code>, <code>manage_ui_component</code>, <code>validate_ui_component</code>) zum Erstellen, Ändern und Löschen von Main-UI-Seiten und benutzerdefinierten Widgets. Die Tools enthalten einen gepflegten Widget-Katalog sowie eine integrierte Referenz für die Skriptsprache (<code>\=items.X.state</code>), Grammatik für Actions, Sichtbarkeitsregeln und Slot-Conventions für Widgets, damit der Agent gültiges YAML erzeugt, anstatt Komponentennamen oder Property-Keys zu halluzinieren. Schreibvorgänge (CRUD) erfolgen über die openHAB-REST-API unter <code>/rest/ui/components/</code> und erfordern, dass das Bearer-Token des Aufrufers über den Berechtigungsumfang <strong>Administrator</strong> verfügt; Lesevorgänge sind allein durch diese Option möglich.
io.config.mcp.enableStaticAssets.label = Verwaltung statischen Contents aktivieren
io.config.mcp.enableStaticAssets.description = Wenn aktiviert, erhält der Agent <code>manage_static_asset</code> zum Auflisten, Lesen, Hochladen und Löschen von Dateien in <code>$OPENHAB_CONF/html</code> (dem unter <code>/static/</code> bereitgestellten Ordner, der z. B. für Hintergründe von Plan-Seiten, Icons benutzerdefinierter Widgets oder CSS-Overrides verwendet wird). Nützlich in Kombination mit <code>enableUiDesign</code>, damit der Agent einen Grundriss hochladen und anschließend in derselben Unterhaltung von einer neuen Plan-Seite aus referenzieren kann. Schreibvorgänge erfolgen direkt auf die Festplatte, da es keine REST-API für diese Funktionalität gibt. Daher erzwingt das Bundle den Berechtigungsumfang <strong>Administrator</strong>, indem es vor jedem Aufruf mit dem Bearer-Token der Sitzung einen administratorgeschützten REST-Endpunkt abfragt. Dateinamen werden auf unzulässige Zeichen geprüft (einschließlich Symlinks, die außerhalb des Stammverzeichnisses zeigen), Dateierweiterungen sind auf eine Positivliste beschränkt, und Uploads sind auf 10 MB pro Aufruf begrenzt. Zu beachten ist, dass unter <code>/static/</code> bereitgestellte Dateien mit den Endungen <code>.html</code>, <code>.htm</code>, <code>.svg</code> und <code>.js</code> im Browser ausgeführt werden. Ein Agent, der solche Dateien schreibt, wird dadurch zu einem XSS-Vektor gegen Ihre Main UI; die Tool-Beschreibung weist darauf hin, aber der Administrator sollte diese Option wie <code>enableScripting</code> behandeln.
io.config.mcp.enabled.label = MCP-Server aktivieren
io.config.mcp.enabled.description = Aktiviert oder deaktiviert den MCP-Server-Endpunkt.
io.config.mcp.exposeUntaggedItems.label = Nicht getaggte Items einbeziehen
io.config.mcp.exposeUntaggedItems.description = Legt fest, ob Items, die nicht Teil des semantischen Modells sind, in Suchergebnisse einbezogen werden.
io.config.mcp.maxItemsPerPage.label = Maximale Items pro Seite
io.config.mcp.maxItemsPerPage.description = Maximale Anzahl von Items, die pro Seite zurückgegeben werden, wenn die Tool-Antworten in mehrere Seiten aufgeteilt sind.
io.config.mcp.registerCloudWebhook.label = openHAB-Cloud-Webhook registrieren
io.config.mcp.registerCloudWebhook.description = Wenn aktiviert, wird der Endpunkt <code>/mcp</code> beim openHAB-Cloud-Dienst registriert, sodass entfernte MCP-Clients (Claude Desktop, ChatGPT usw.) diesen Server über eine stabile URL der Form <code>https\://myopenhab.org/api/hooks/&lt;uuid&gt;</code> erreichen können – ohne Portweiterleitung oder Reverse-Proxy. Erfordert, dass das openHAB-Cloud-Add-on installiert und mit myopenhab.org verbunden ist.
io.config.mcp.resourceCoalesceMs.label = Zeitfenster zur Bündelung von Ressourcenbenachrichtigungen
io.config.mcp.resourceCoalesceMs.description = Mindestabstand in Millisekunden zwischen notifications/resources/updated-Benachrichtigungen für dieselbe Ressourcen-URI. Verhindert eine Flut von Benachrichtigungen bei oft aktualisierten Items (Leistungsmessgeräte, CPU-Auslastung). Auf 0 setzen, um diese Funktion zu deaktivieren.
io.config.mcp.webhookUrl.label = Cloud-Webhook-URL
io.config.mcp.webhookUrl.description = Öffentliche URL, die von openHAB Cloud nach Registrierung des Webhooks zugewiesen wird. Diese in Ihren entfernten MCP-Client (Claude Desktop, ChatGPT usw.) als MCP-Serveradresse einfügen. Leer, wenn der Cloud-Webhook deaktiviert oder der Cloud-Dienst nicht verbunden ist.
