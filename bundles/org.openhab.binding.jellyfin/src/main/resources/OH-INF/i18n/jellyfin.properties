# add-on

addon.jellyfin.name = Jellyfin Binding
addon.jellyfin.description = This is the binding for Jellyfin the free software media system.

# add-on config

addon.config.jellyfin.discoveryPort.label = Port
addon.config.jellyfin.discoveryPort.description = UDP port used to broadcast discovery queries on the local network. This is the Jellyfin auto-discovery port (default 7359), not the HTTP/HTTPS port used to connect to the server.
addon.config.jellyfin.discoveryTimeout.label = Timeout
addon.config.jellyfin.discoveryTimeout.description = Maximum amount of time to wait for a response
addon.config.jellyfin.group.discovery.label = Discovery
addon.config.jellyfin.group.discovery.description = Finetune Jellyfin-Server discovery parameters.

# thing types

thing-type.jellyfin.client.label = Jellyfin Client
thing-type.jellyfin.client.description = Represents a running Jellyfin client connected to a server
thing-type.jellyfin.server.label = Jellyfin Server
thing-type.jellyfin.server.description = Represents a running Jellyfin server instance

# thing types config

thing-type.config.jellyfin.client.group.images.label = Now Playing Images
thing-type.config.jellyfin.client.group.images.description = Download cover art for the item currently playing on this device.<br/> Each image type can be enabled independently. All types are disabled by default because image downloads add network load on every session update (every 30 seconds by default).<br/> <b>Supported image types:</b> <ul> <li><b>Primary</b> – Album/movie poster or main cover art</li> <li><b>Backdrop</b> – Full-resolution background/fanart</li> <li><b>Logo</b> – Transparent text or graphical logo</li> <li><b>Thumb</b> – Landscape thumbnail (episode still or wide-format preview)</li> <li><b>Disc</b> – CD, DVD or Blu-ray disc artwork</li> <li><b>Art</b> – ClearArt / transparent promotional artwork</li> <li><b>Banner</b> – Wide horizontal banner (TheTVDB-style)</li> </ul>
thing-type.config.jellyfin.client.imageArtEnabled.label = Enable Art Image
thing-type.config.jellyfin.client.imageArtEnabled.description = Download the ClearArt (transparent promotional artwork) for the item currently playing.<br/> When enabled, a <code>playing-item-image-art</code> channel is created automatically.
thing-type.config.jellyfin.client.imageArtWidth.label = Art Image Width
thing-type.config.jellyfin.client.imageArtWidth.description = Maximum width in pixels for the downloaded art image. Larger sizes provide better quality but consume more bandwidth and memory.
thing-type.config.jellyfin.client.imageArtWidth.option.128 = 128 px – Thumbnail
thing-type.config.jellyfin.client.imageArtWidth.option.256 = 256 px – Small
thing-type.config.jellyfin.client.imageArtWidth.option.512 = 512 px – Medium (default)
thing-type.config.jellyfin.client.imageArtWidth.option.1024 = 1024 px – Large
thing-type.config.jellyfin.client.imageBackdropEnabled.label = Enable Backdrop Image
thing-type.config.jellyfin.client.imageBackdropEnabled.description = Download the background fanart / backdrop image for the item currently playing. Typically a wide full-resolution scene image.<br/> When enabled, a <code>playing-item-image-backdrop</code> channel is created automatically.
thing-type.config.jellyfin.client.imageBackdropWidth.label = Backdrop Image Width
thing-type.config.jellyfin.client.imageBackdropWidth.description = Maximum width in pixels for the downloaded backdrop image. Larger sizes provide better quality but consume more bandwidth and memory.
thing-type.config.jellyfin.client.imageBackdropWidth.option.128 = 128 px – Thumbnail
thing-type.config.jellyfin.client.imageBackdropWidth.option.256 = 256 px – Small
thing-type.config.jellyfin.client.imageBackdropWidth.option.512 = 512 px – Medium (default)
thing-type.config.jellyfin.client.imageBackdropWidth.option.1024 = 1024 px – Large
thing-type.config.jellyfin.client.imageBannerEnabled.label = Enable Banner Image
thing-type.config.jellyfin.client.imageBannerEnabled.description = Download the wide horizontal banner (TheTVDB-style) for the item currently playing.<br/> When enabled, a <code>playing-item-image-banner</code> channel is created automatically.
thing-type.config.jellyfin.client.imageBannerWidth.label = Banner Image Width
thing-type.config.jellyfin.client.imageBannerWidth.description = Maximum width in pixels for the downloaded banner image. Larger sizes provide better quality but consume more bandwidth and memory.
thing-type.config.jellyfin.client.imageBannerWidth.option.128 = 128 px – Thumbnail
thing-type.config.jellyfin.client.imageBannerWidth.option.256 = 256 px – Small
thing-type.config.jellyfin.client.imageBannerWidth.option.512 = 512 px – Medium (default)
thing-type.config.jellyfin.client.imageBannerWidth.option.1024 = 1024 px – Large
thing-type.config.jellyfin.client.imageDiscEnabled.label = Enable Disc Image
thing-type.config.jellyfin.client.imageDiscEnabled.description = Download the CD, DVD or Blu-ray disc artwork for the item currently playing.<br/> When enabled, a <code>playing-item-image-disc</code> channel is created automatically.
thing-type.config.jellyfin.client.imageDiscWidth.label = Disc Image Width
thing-type.config.jellyfin.client.imageDiscWidth.description = Maximum width in pixels for the downloaded disc image. Larger sizes provide better quality but consume more bandwidth and memory.
thing-type.config.jellyfin.client.imageDiscWidth.option.128 = 128 px – Thumbnail
thing-type.config.jellyfin.client.imageDiscWidth.option.256 = 256 px – Small
thing-type.config.jellyfin.client.imageDiscWidth.option.512 = 512 px – Medium (default)
thing-type.config.jellyfin.client.imageDiscWidth.option.1024 = 1024 px – Large
thing-type.config.jellyfin.client.imageLogoEnabled.label = Enable Logo Image
thing-type.config.jellyfin.client.imageLogoEnabled.description = Download the transparent text or graphical logo for the item currently playing.<br/> When enabled, a <code>playing-item-image-logo</code> channel is created automatically.
thing-type.config.jellyfin.client.imageLogoWidth.label = Logo Image Width
thing-type.config.jellyfin.client.imageLogoWidth.description = Maximum width in pixels for the downloaded logo image. Larger sizes provide better quality but consume more bandwidth and memory.
thing-type.config.jellyfin.client.imageLogoWidth.option.128 = 128 px – Thumbnail
thing-type.config.jellyfin.client.imageLogoWidth.option.256 = 256 px – Small
thing-type.config.jellyfin.client.imageLogoWidth.option.512 = 512 px – Medium (default)
thing-type.config.jellyfin.client.imageLogoWidth.option.1024 = 1024 px – Large
thing-type.config.jellyfin.client.imagePrimaryEnabled.label = Enable Primary Image
thing-type.config.jellyfin.client.imagePrimaryEnabled.description = Download the primary cover art (album cover, movie poster, or main thumbnail) for the item currently playing.<br/> When enabled, a <code>playing-item-image-primary</code> channel is created automatically.
thing-type.config.jellyfin.client.imagePrimaryWidth.label = Primary Image Width
thing-type.config.jellyfin.client.imagePrimaryWidth.description = Maximum width in pixels for the downloaded primary image. Larger sizes provide better quality but consume more bandwidth and memory.
thing-type.config.jellyfin.client.imagePrimaryWidth.option.128 = 128 px – Thumbnail
thing-type.config.jellyfin.client.imagePrimaryWidth.option.256 = 256 px – Small
thing-type.config.jellyfin.client.imagePrimaryWidth.option.512 = 512 px – Medium (default)
thing-type.config.jellyfin.client.imagePrimaryWidth.option.1024 = 1024 px – Large
thing-type.config.jellyfin.client.imageThumbEnabled.label = Enable Thumb Image
thing-type.config.jellyfin.client.imageThumbEnabled.description = Download the landscape thumbnail (wide-format still or episode preview) for the item currently playing.<br/> When enabled, a <code>playing-item-image-thumb</code> channel is created automatically.
thing-type.config.jellyfin.client.imageThumbWidth.label = Thumb Image Width
thing-type.config.jellyfin.client.imageThumbWidth.description = Maximum width in pixels for the downloaded thumb image. Larger sizes provide better quality but consume more bandwidth and memory.
thing-type.config.jellyfin.client.imageThumbWidth.option.128 = 128 px – Thumbnail
thing-type.config.jellyfin.client.imageThumbWidth.option.256 = 256 px – Small
thing-type.config.jellyfin.client.imageThumbWidth.option.512 = 512 px – Medium (default)
thing-type.config.jellyfin.client.imageThumbWidth.option.1024 = 1024 px – Large
thing-type.config.jellyfin.client.serialNumber.label = Device ID
thing-type.config.jellyfin.client.serialNumber.description = The Jellyfin device ID as reported by the client application.
thing-type.config.jellyfin.server.discoverAndroidClients.label = Discover Android Clients
thing-type.config.jellyfin.server.discoverAndroidClients.description = Discover Jellyfin Android clients.<br/> Matches clients reporting as: <i>Jellyfin for Android</i>
thing-type.config.jellyfin.server.discoverAndroidTvClients.label = Discover Android TV Clients
thing-type.config.jellyfin.server.discoverAndroidTvClients.description = Discover Jellyfin Android TV clients.<br/> Matches clients reporting as: <i>Jellyfin for Android TV</i>
thing-type.config.jellyfin.server.discoverIosClients.label = Discover iOS Clients
thing-type.config.jellyfin.server.discoverIosClients.description = Discover iOS clients.<br/> Matches clients reporting as: <i>Jellyfin iOS</i>, <i>Swiftfin</i>, <i>Infuse</i>
thing-type.config.jellyfin.server.discoverKodiClients.label = Discover Kodi Clients
thing-type.config.jellyfin.server.discoverKodiClients.description = Discover Kodi clients.<br/> Matches clients reporting as: <i>JellyCon</i>, <i>Jellyfin for Kodi</i>
thing-type.config.jellyfin.server.discoverOtherClients.label = Discover Other Clients
thing-type.config.jellyfin.server.discoverOtherClients.description = Discover third-party clients not matched by any other category above.
thing-type.config.jellyfin.server.discoverRokuClients.label = Discover Roku Clients
thing-type.config.jellyfin.server.discoverRokuClients.description = Discover Roku clients.<br/> Matches clients reporting as: <i>Jellyfin for Roku</i>
thing-type.config.jellyfin.server.discoverWebClients.label = Discover Web Clients
thing-type.config.jellyfin.server.discoverWebClients.description = Discover Jellyfin Web clients.<br/> Matches clients reporting as: <i>Jellyfin Web</i>
thing-type.config.jellyfin.server.group.clientDiscoveryFilters.label = Client Discovery Filters
thing-type.config.jellyfin.server.group.clientDiscoveryFilters.description = Enable or disable automatic discovery for specific Jellyfin client categories.<br/> The category is determined by the client application name as reported to the Jellyfin server.<br/> <b>Note:</b> These settings only affect the openHAB Inbox; they do not remove already-discovered things.
thing-type.config.jellyfin.server.hostname.label = Hostname/IP
thing-type.config.jellyfin.server.hostname.description = Hostname or IP address of the server
thing-type.config.jellyfin.server.path.label = Base Path
thing-type.config.jellyfin.server.path.description = Base path of the server
thing-type.config.jellyfin.server.port.label = Port
thing-type.config.jellyfin.server.port.description = Port of the server
thing-type.config.jellyfin.server.refreshSeconds.label = Refresh Seconds
thing-type.config.jellyfin.server.refreshSeconds.description = Interval to pull devices state from the server
thing-type.config.jellyfin.server.serverName.label = Server Name
thing-type.config.jellyfin.server.serverName.description = Human-readable name for the server (auto-discovered from server if not set)
thing-type.config.jellyfin.server.ssl.label = SSL
