channel-type.exec.output.label = Rückgabewert
channel-type.exec.output.description = Rückgabewert der Befehlsausführung
channel-type.exec.stdout.label = Standardausgabe
channel-type.exec.stdout.description = Die stdout-Ausgabe der letzten Ausführung des Befehls
channel-type.exec.stderr.label = Standardfehlerausgabe
