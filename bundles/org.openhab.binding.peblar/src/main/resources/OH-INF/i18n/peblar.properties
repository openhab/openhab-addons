# add-on

addon.peblar.name = Peblar Binding
addon.peblar.description = This is the openHAB binding for the Peblar EV Charger using the Local Web API.

# thing types

thing-type.peblar.charger.label = Peblar EV Charger
thing-type.peblar.charger.description = Peblar EV Charger accessed via local REST API. Requires firmware 1.6 or newer and the API enabled in the charger web interface.

# thing types config

thing-type.config.peblar.charger.apiToken.label = API Token
thing-type.config.peblar.charger.apiToken.description = Authorization token for the local REST API (set in charger web interface)
thing-type.config.peblar.charger.hostname.label = Hostname / IP Address
thing-type.config.peblar.charger.hostname.description = Hostname or IP address of the Peblar charger on the local network
thing-type.config.peblar.charger.refreshInterval.label = Refresh Interval
thing-type.config.peblar.charger.refreshInterval.description = How often to poll the charger in seconds (default: 30)

