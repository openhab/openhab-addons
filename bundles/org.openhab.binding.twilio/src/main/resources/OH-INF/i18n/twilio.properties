# add-on

addon.twilio.name = Twilio Binding
addon.twilio.description = Integrates with Twilio for sending and receiving SMS, MMS, and WhatsApp messages, as well as making and receiving voice calls with text-to-speech and DTMF input support.

# thing types

thing-type.twilio.account.label = Twilio Account
thing-type.twilio.account.description = A Twilio account that provides API access for sending SMS, MMS, WhatsApp messages, and making voice calls.
thing-type.twilio.phone.label = Twilio Phone Number
thing-type.twilio.phone.description = Represents a Twilio phone number for sending and receiving SMS, MMS, WhatsApp messages, and voice calls.

# thing types config

thing-type.config.twilio.account.accountSid.label = Account SID
thing-type.config.twilio.account.accountSid.description = Your Twilio Account SID (starts with AC). Found in the Twilio Console dashboard.
thing-type.config.twilio.account.authToken.label = Auth Token
thing-type.config.twilio.account.authToken.description = Your Twilio Auth Token. Found in the Twilio Console dashboard.
thing-type.config.twilio.account.autoConfigureWebhooks.label = Auto-Configure Webhooks
thing-type.config.twilio.account.autoConfigureWebhooks.description = When enabled, automatically configures webhook URLs on Twilio phone numbers via the API. Requires Public URL or Cloud Webhook to be configured.
thing-type.config.twilio.account.publicUrl.label = Public URL
thing-type.config.twilio.account.publicUrl.description = Public-facing base URL for webhook callbacks (e.g. https://my.domain.com). Required to receive incoming messages and calls.
thing-type.config.twilio.account.useCloudWebhook.label = Use openHAB Cloud Webhooks
thing-type.config.twilio.account.useCloudWebhook.description = When enabled, uses the openHAB Cloud service to provide publicly-reachable webhook URLs for receiving incoming messages and calls. Requires the openHAB Cloud Connector add-on to be installed and connected. This eliminates the need for port forwarding or a reverse proxy.
thing-type.config.twilio.phone.gatherResponse.label = Gather Response TwiML
thing-type.config.twilio.phone.gatherResponse.description = TwiML returned after DTMF digits are gathered from a caller. Used as fallback when no rule responds with respondWithTwiml.
thing-type.config.twilio.phone.phoneNumber.label = Phone Number
thing-type.config.twilio.phone.phoneNumber.description = Your Twilio phone number in E.164 format (e.g. +15551234567).
thing-type.config.twilio.phone.responseTimeout.label = Response Timeout
thing-type.config.twilio.phone.responseTimeout.description = Seconds to wait for a rule to respond with TwiML via respondWithTwiml before using the default greeting or gather response.
thing-type.config.twilio.phone.voiceGreeting.label = Voice Greeting TwiML
thing-type.config.twilio.phone.voiceGreeting.description = TwiML returned when an incoming voice call is received. Use {gatherUrl} as a placeholder for the DTMF callback URL.

# channel types

channel-type.twilio.call-received.label = Call Received
channel-type.twilio.call-received.description = Triggered when an incoming voice call is received. Payload is a JSON object with from, to, callSid, and callStatus fields.
channel-type.twilio.call-status-update.label = Call Status Update
channel-type.twilio.call-status-update.description = Triggered when a call status changes. Payload is a JSON object with callSid, callStatus, from, and to fields.
channel-type.twilio.dtmf-received.label = DTMF Received
channel-type.twilio.dtmf-received.description = Triggered when DTMF digits are gathered from a caller. Payload is a JSON object with digits, callSid, from, and to fields.
channel-type.twilio.last-call-date.label = Last Call Date
channel-type.twilio.last-call-date.description = Timestamp of the last incoming call.
channel-type.twilio.last-call-from.label = Last Call From
channel-type.twilio.last-call-from.description = Phone number of the last incoming caller.
channel-type.twilio.last-call-status.label = Last Call Status
channel-type.twilio.last-call-status.description = Status of the last call (e.g. ringing, in-progress, completed).
channel-type.twilio.last-dtmf-digits.label = Last DTMF Digits
channel-type.twilio.last-dtmf-digits.description = Last DTMF digits received from a caller during a voice call.
channel-type.twilio.last-message-body.label = Last Message Body
channel-type.twilio.last-message-body.description = Body text of the last received SMS or WhatsApp message.
channel-type.twilio.last-message-date.label = Last Message Date
channel-type.twilio.last-message-date.description = Timestamp of the last received message.
channel-type.twilio.last-message-from.label = Last Message From
channel-type.twilio.last-message-from.description = Phone number of the last message sender.
channel-type.twilio.last-message-media-url.label = Last Message Media URL
channel-type.twilio.last-message-media-url.description = URL of the first media attachment from the last received MMS or WhatsApp message.
channel-type.twilio.last-message-sid.label = Last Message SID
channel-type.twilio.last-message-sid.description = Twilio Message SID of the last received message.
channel-type.twilio.message-status.label = Message Status
channel-type.twilio.message-status.description = Triggered when a message delivery status changes. Payload is a JSON object with messageSid, messageStatus, and to fields.
channel-type.twilio.sms-received.label = SMS Received
channel-type.twilio.sms-received.description = Triggered when an SMS or MMS message is received. Payload is a JSON object with from, to, body, messageSid, numMedia, and mediaUrls fields.
channel-type.twilio.whatsapp-received.label = WhatsApp Received
channel-type.twilio.whatsapp-received.description = Triggered when a WhatsApp message is received. Payload is a JSON object with from, to, body, messageSid, numMedia, and mediaUrls fields.

