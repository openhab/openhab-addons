# add-on

addon.twilio.name = Twilio Binding
addon.twilio.description = Integrates with Twilio for sending and receiving SMS, MMS, and WhatsApp messages, as well as making and receiving voice calls with text-to-speech and DTMF input support.

# thing types

thing-type.twilio.account.label = Twilio Account
thing-type.twilio.account.description = A Twilio account that provides API access for sending SMS, MMS, WhatsApp messages, and making voice calls.
thing-type.twilio.phone.label = Twilio Phone Number
thing-type.twilio.phone.description = Represents a Twilio phone number for sending and receiving SMS, MMS, WhatsApp messages, and voice calls.

# thing types config

thing-type.config.twilio.account.accountSid.label = Account SID
thing-type.config.twilio.account.accountSid.description = Your Twilio Account SID (starts with AC). Found in the Twilio Console dashboard.
thing-type.config.twilio.account.authToken.label = Auth Token
thing-type.config.twilio.account.authToken.description = Your Twilio Auth Token. Found in the Twilio Console dashboard.
thing-type.config.twilio.account.autoConfigureWebhooks.label = Auto-Configure Webhooks
thing-type.config.twilio.account.autoConfigureWebhooks.description = When enabled, automatically configures webhook URLs on Twilio phone numbers via the API. Requires Public URL to be set.
thing-type.config.twilio.account.publicUrl.label = Public URL
thing-type.config.twilio.account.publicUrl.description = Public-facing base URL for webhook callbacks (e.g. https://my.domain.com). Required to receive incoming messages and calls.
thing-type.config.twilio.phone.gatherResponse.label = Gather Response TwiML
thing-type.config.twilio.phone.gatherResponse.description = TwiML returned after DTMF digits are gathered from a caller. Used as fallback when no rule responds with respondWithTwiml.
thing-type.config.twilio.phone.phoneNumber.label = Phone Number
thing-type.config.twilio.phone.phoneNumber.description = Your Twilio phone number in E.164 format (e.g. +15551234567).
thing-type.config.twilio.phone.responseTimeout.label = Response Timeout
thing-type.config.twilio.phone.responseTimeout.description = Seconds to wait for a rule to respond with TwiML via respondWithTwiml before using the default greeting or gather response.
thing-type.config.twilio.phone.voiceGreeting.label = Voice Greeting TwiML
thing-type.config.twilio.phone.voiceGreeting.description = TwiML returned when an incoming voice call is received. Use {gatherUrl} as a placeholder for the DTMF callback URL.

# channel types

channel-type.twilio.callReceived.label = Call Received
channel-type.twilio.callReceived.description = Triggered when an incoming voice call is received. Payload is a JSON object with from, to, callSid, and callStatus fields.
channel-type.twilio.dtmfReceived.label = DTMF Received
channel-type.twilio.dtmfReceived.description = Triggered when DTMF digits are gathered from a caller. Payload is a JSON object with digits, callSid, from, and to fields.
channel-type.twilio.lastCallDate.label = Last Call Date
channel-type.twilio.lastCallDate.description = Timestamp of the last incoming call.
channel-type.twilio.lastCallFrom.label = Last Call From
channel-type.twilio.lastCallFrom.description = Phone number of the last incoming caller.
channel-type.twilio.lastCallStatus.label = Last Call Status
channel-type.twilio.lastCallStatus.description = Status of the last call (e.g. ringing, in-progress, completed).
channel-type.twilio.lastDtmfDigits.label = Last DTMF Digits
channel-type.twilio.lastDtmfDigits.description = Last DTMF digits received from a caller during a voice call.
channel-type.twilio.lastMessageBody.label = Last Message Body
channel-type.twilio.lastMessageBody.description = Body text of the last received SMS or WhatsApp message.
channel-type.twilio.lastMessageDate.label = Last Message Date
channel-type.twilio.lastMessageDate.description = Timestamp of the last received message.
channel-type.twilio.lastMessageFrom.label = Last Message From
channel-type.twilio.lastMessageFrom.description = Phone number of the last message sender.
channel-type.twilio.lastMessageMediaUrl.label = Last Message Media URL
channel-type.twilio.lastMessageMediaUrl.description = URL of the first media attachment from the last received MMS or WhatsApp message.
channel-type.twilio.lastMessageSid.label = Last Message SID
channel-type.twilio.lastMessageSid.description = Twilio Message SID of the last received message.
channel-type.twilio.messageStatus.label = Message Status
channel-type.twilio.messageStatus.description = Triggered when a message delivery status changes. Payload is a JSON object with messageSid, messageStatus, and to fields.
channel-type.twilio.smsReceived.label = SMS Received
channel-type.twilio.smsReceived.description = Triggered when an SMS or MMS message is received. Payload is a JSON object with from, to, body, messageSid, numMedia, and mediaUrls fields.
channel-type.twilio.whatsappReceived.label = WhatsApp Received
channel-type.twilio.whatsappReceived.description = Triggered when a WhatsApp message is received. Payload is a JSON object with from, to, body, messageSid, numMedia, and mediaUrls fields.
