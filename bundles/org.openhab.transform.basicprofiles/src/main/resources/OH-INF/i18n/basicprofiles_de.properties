# add-on

addon.basicprofiles.name = Basic Profiles
addon.basicprofiles.description = Dieses Transformation Bundle stellt eine Sammlung von Profiles zur Verfügung.

profile.config.basic-profiles.debounce-counting.numberOfChanges.label = Anzahl der Änderungen
profile.config.basic-profiles.debounce-counting.numberOfChanges.description = Anzahl der Änderungen vor der Aktualisierung des Item Zustands.
profile.config.basic-profiles.debounce-state.onDelay.label = Einschaltverzögerung
profile.config.basic-profiles.debounce-state.onDelay.description = Verzögerung, bevor ein Wert vom Typ "ON" (Schalter) oder "OPEN" (Kontakt) an das Item weitergeleitet wird. Der Wert 0 bewirkt eine sofortige Weiterleitung.
profile.config.basic-profiles.debounce-state.offDelay.label = Ausschaltverzögerung
profile.config.basic-profiles.debounce-state.offDelay.description = Verzögerung, bevor ein Wert für "OFF" (Schalter) bzw. "CLOSED" (Kontakt) an das Item weitergeleitet wird. Der Wert 0 bewirkt eine sofortige Weiterleitung.
profile.config.basic-profiles.debounce-time.mode.label = Modus
profile.config.basic-profiles.debounce-time.mode.option.FIRST = Sende ersten Wert
profile.config.basic-profiles.debounce-time.mode.option.LAST = Sende letzten Wert
profile.config.basic-profiles.debounce-time.toHandlerDelay.label = Verzögerung zum Handler
profile.config.basic-profiles.debounce-time.toHandlerDelay.description = Zeitspanne, bevor ein Wert an den Handler weitergeleitet (oder nach dem ersten Wert verworfen) wird.
profile.config.basic-profiles.debounce-time.toItemDelay.label = Verzögerung zum Item 
profile.config.basic-profiles.debounce-time.toItemDelay.description = Zeitspanne, bevor ein Wert an das Item weitergeleitet (oder nach dem ersten Wert verworfen) wird.
profile.config.basic-profiles.generic-command.command.label = Kommando
profile.config.basic-profiles.generic-command.command.description = Befehl, der beim Auslösen des Ereignisses gesendet wird.
profile.config.basic-profiles.generic-command.command.option.INCREASE = INCREASE
profile.config.basic-profiles.generic-command.command.option.DECREASE = DECREASE
profile.config.basic-profiles.generic-command.command.option.NEXT = NEXT
profile.config.basic-profiles.generic-command.command.option.PREVIOUS = PREVIOUS
profile.config.basic-profiles.generic-command.command.option.ON = ON
profile.config.basic-profiles.generic-command.command.option.OFF = OFF
profile.config.basic-profiles.generic-command.command.option.PLAY = PLAY
profile.config.basic-profiles.generic-command.command.option.PAUSE = PAUSE
profile.config.basic-profiles.generic-command.command.option.REWIND = REWIND
profile.config.basic-profiles.generic-command.command.option.FASTFORWARD = FASTFORWARD
profile.config.basic-profiles.generic-command.command.option.STOP = STOP
profile.config.basic-profiles.generic-command.command.option.MOVE = MOVE
profile.config.basic-profiles.generic-command.command.option.UP = UP
profile.config.basic-profiles.generic-command.command.option.DOWN = DOWN
profile.config.basic-profiles.generic-command.events.label = Ereignisse
profile.config.basic-profiles.generic-command.events.description = Durch Kommas getrennte Liste von Ereignissen, auf die das Profil reagieren soll.
profile.config.basic-profiles.inactivity.inverted.label = Invertiert
profile.config.basic-profiles.inactivity.inverted.description = Optional. Bei "false" (Standard) ist der Zustand des Elements anfangs "OFF" und wechselt nach Ablauf der Zeitspanne zu "ON". Bei "true" ist das Verhalten umgekehrt\: Der Anfangszustand ist "ON", und er wechselt nach Ablauf der Zeitspanne zu "OFF".
profile.config.basic-profiles.inactivity.timeout.label = Zeitlimit
profile.config.basic-profiles.inactivity.timeout.description = Zeitraum, nach dem der Status des Items aktualisiert wird, wenn keine Daten vom Binding empfangen werden. Der Standardwert beträgt 1 Stunde. Das Format entspricht dem des Parameters "expire".
profile.config.basic-profiles.round.mode.label = Rundungsmodus
profile.config.basic-profiles.round.mode.description = Zu verwendender Rundungsmodus (z. B. "UP", "DOWN", "CEILING", "FLOOR", "HALF_UP", oder "HALF_DOWN").
profile.config.basic-profiles.round.mode.option.UP = UP
profile.config.basic-profiles.round.mode.option.DOWN = DOWN
profile.config.basic-profiles.round.mode.option.CEILING = CEILING
profile.config.basic-profiles.round.mode.option.FLOOR = FLOOR
profile.config.basic-profiles.round.mode.option.HALF_UP = HALF_UP
profile.config.basic-profiles.round.mode.option.HALF_DOWN = HALF_DOWN
profile.config.basic-profiles.round.precision.label = Genauigkeit
profile.config.basic-profiles.round.precision.description = Optional. Anzahl der signifikanten Stellen, auf die bei numerischen Werten vor Anwendung der Skalierung gerundet werden soll. Wird bei DateTime-Werten ignoriert.
profile.config.basic-profiles.round.scale.label = Skalierung
profile.config.basic-profiles.round.scale.description = Bei numerischen Werten gibt die Skalierung (Scale) die resultierende Anzahl der Nachkommastellen an. Bei DateTime-Werten wird der UTC-Zeitstempel gerundet, wobei die Skalierung 0 für Tage, 1 für Stunden, 2 für Minuten, 3 für Sekunden und 4 für Millisekunden steht. Wird bei DateTime-Werten keine Skalierung angegeben, wird der Wert 3 verwendet.
profile.config.basic-profiles.state-filter.conditions.label = Bedingungen
profile.config.basic-profiles.state-filter.conditions.description = Liste von Ausdrücken im Format [ITEM_NAME] OPERATOR VALUE_OR_ITEM_NAME, z. B. "MyItem \=\= OFF". Setzen Sie VALUE_OR_ITEM_NAME in Anführungszeichen, um einen String-Vergleich durchzuführen, z. B. "'OFF'". VALUE kann ein DecimalType oder ein QuantityType mit Einheit sein. Wird ITEM_NAME weggelassen, erfolgt der Vergleich mit dem Eingabezustand des Kanals. <br /><br /> Mehrere Bedingungen können angegeben werden, indem jeder Ausdruck in eine eigene Zeile geschrieben oder – bei Angabe in derselben Zeile – durch ein Trennzeichen (Standard\: ",") voneinander getrennt wird. Zur Ermittlung des Ergebnisses werden alle Bedingungen logisch UND-verknüpft. <br /><br /> Folgende Operatoren werden unterstützt\: <code>EQ</code> oder <code>\=\=</code>, <code>NE</code>, <code>\!\=</code> oder <code>&lt;&gt;</code>, <code>GT</code> oder <code>&gt;</code>, <code>GTE</code> oder <code>&gt;\=</code>, <code>LT</code> oder <code>&lt;</code> sowie <code>LTE</code> oder <code>&lt;\=</code>.
profile.config.basic-profiles.state-filter.mismatchState.label = Status für gefilterte Items
profile.config.basic-profiles.state-filter.mismatchState.description = Der an das Item zu übertragende Status (State), falls die Bedingungen NICHT erfüllt sind. Verwenden Sie Anführungszeichen, um den Wert als `StringType` zu ​​behandeln. Ist kein Wert definiert, wird die Statusaktualisierung nicht an das Item weitergegeben, wenn die Bedingungen nicht erfüllt sind.
profile.config.basic-profiles.state-filter.separator.label = Trennzeichen für Bedingungen
profile.config.basic-profiles.state-filter.separator.description = Zeichen, das zum Trennen von Bedingungen verwendet wird. Standard\: ",".
profile.config.basic-profiles.threshold.threshold.label = Grenzwert
profile.config.basic-profiles.threshold.threshold.description = Schaltet auf ON, wenn der Wert unter dem vorgegebenen Schwellenwert liegt; andernfalls auf OFF.
profile.config.basic-profiles.time-range-command.end.label = Endzeit
profile.config.basic-profiles.time-range-command.end.description = Die Endzeit am Tag (hh\:mm).
profile.config.basic-profiles.time-range-command.inRangeValue.label = Wert innerhalb der Zeitspanne
profile.config.basic-profiles.time-range-command.inRangeValue.description = Der Wert, der gesendet wird, wenn das Profil "ON" erkennt und die aktuelle Zeit zwischen der Startzeit und der Endzeit liegt.
profile.config.basic-profiles.time-range-command.outOfRangeValue.label = Wert außerhalb der Zeitspanne
profile.config.basic-profiles.time-range-command.outOfRangeValue.description = Der Wert, der gesendet wird, wenn das Profil "ON" erkennt und die aktuelle Zeit NICHT zwischen der Start- und Endzeit liegt.
profile.config.basic-profiles.time-range-command.restoreValue.label = Wert wiederherstellen
profile.config.basic-profiles.time-range-command.restoreValue.description = Auswählen, was passieren soll, wenn das Profil wieder OFF erkennt.
profile.config.basic-profiles.time-range-command.restoreValue.option.OFF = Aus
profile.config.basic-profiles.time-range-command.restoreValue.option.PREVIOUS = Zurück zum vorherigen Status
profile.config.basic-profiles.time-range-command.restoreValue.option.NOTHING = Unternehme nichts
profile.config.basic-profiles.time-range-command.start.label = Startzeit
profile.config.basic-profiles.time-range-command.start.description = Die Startzeit am Tag (hh\:mm).
profile.config.basic-profiles.time-weighted-average.delta.label = Delta
profile.config.basic-profiles.time-weighted-average.delta.description = Wenn eine Zustandsänderung den konfigurierten Delta-Wert über- oder unterschreitet, wird sie sofort weitergegeben.
profile.config.basic-profiles.time-weighted-average.duration.label = Dauer
profile.config.basic-profiles.time-weighted-average.duration.description = Dauer des Zeitraums für die Erfassung von Statusaktualisierungen
profile.config.basic-profiles.toggle-switch.events.label = Ereignisse
profile.config.basic-profiles.toggle-switch.events.description = Durch Kommas getrennte Liste von Ereignissen, auf die das Profil reagieren soll.

