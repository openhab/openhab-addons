# add-on

addon.java223.name = Java223 Scripting
addon.java223.description = This bundle allows using Java in JSR223 scripts.

# add-on config

addon.config.java223.additionalBundles.label = Additional Bundles
addon.config.java223.additionalBundles.description = Additional bundles exported for developing, concatenated by ",". Will be included in convenience-dependencies.jar
addon.config.java223.additionalClasses.label = Additional Classes
addon.config.java223.additionalClasses.description = Additional classes exported for developing, concatenated by ",". Will be included in convenience-dependencies.jar
addon.config.java223.allowInstanceReuse.label = Allow Script Instance Reuse
addon.config.java223.allowInstanceReuse.description = Reuse a script instance if found in the cache. Allow sharing data between subsequent executions.
addon.config.java223.enableHelper.label = Enable Helper Library
addon.config.java223.enableHelper.description = If set to false, disable helper, convenience-dependencies and all code generation.
addon.config.java223.group.cache.label = Cache
addon.config.java223.group.cache.description = Cache compilation settings.
addon.config.java223.group.helperLib.label = Helper Library
addon.config.java223.group.helperLib.description = Helper library generation settings.
addon.config.java223.stabilityGenerationWaitTime.label = Stability Generation Wait Time
addon.config.java223.stabilityGenerationWaitTime.description = Delay (in ms) before writing generated classes. Each new generation triggering event further delays the generation. Useful to prevent multiple code generations when many Things activate at the same times.
addon.config.java223.startupGuardTime.label = Startup Guard Time
addon.config.java223.startupGuardTime.description = Delay (in ms) before overwriting previously generated classes, at startup. Useful to not replace files from previous openHAB run with incomplete generation from a not fully loaded system.
