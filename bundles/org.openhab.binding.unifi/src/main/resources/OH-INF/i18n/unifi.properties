addon.unifi.name = UniFi Binding
addon.unifi.description = Provides a shared UniFi console bridge used by the Network, Protect, and Access child bindings

# thing types

thing-type.unifi.controller.label = UniFi Controller
thing-type.unifi.controller.description = A UniFi console that provides a shared authenticated session

thing-type.config.unifi.controller.host.label = Host
thing-type.config.unifi.controller.host.description = Hostname or IP address of the UniFi console
thing-type.config.unifi.controller.username.label = Username
thing-type.config.unifi.controller.username.description = Local user account on the UniFi console
thing-type.config.unifi.controller.password.label = Password
thing-type.config.unifi.controller.password.description = Password for the local user account
thing-type.config.unifi.controller.port.label = Port
thing-type.config.unifi.controller.port.description = Port on which the UniFi console is listening (443 for UniFiOS, 8443 for legacy)
thing-type.config.unifi.controller.unifios.label = UniFi OS
thing-type.config.unifi.controller.unifios.description = Whether this is a UniFiOS console (selects /api/auth/login vs /api/login)
thing-type.config.unifi.controller.timeoutSeconds.label = Request Timeout
thing-type.config.unifi.controller.timeoutSeconds.description = HTTP request timeout in seconds

# status messages

offline.conf-error-auth-rejected = Authentication failed - check username and password
offline.login-throttled = Login throttled by UniFi controller
offline.comm-error-retrying = Authentication failed, retrying
