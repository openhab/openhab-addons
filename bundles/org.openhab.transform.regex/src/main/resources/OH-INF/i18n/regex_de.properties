# add-on

addon.regex.name = Regex Transformation
addon.regex.description = Transformiert eine Zeichenfolge auf der Grundlage eines Suchmusters für reguläre Ausdrücke (Regex).

profile.config.transform.REGEX.function.label = Regulärer Ausdruck
profile.config.transform.REGEX.function.description = Ein auf den State anzuwendender regulärer Ausdruck. Er sollte eine Capture Group enthalten, deren Inhalt das Ergebnis liefert. Beispiel\: .*\=(\\d*\\.\\d*).* extrahiert 23.5 aus temp\=23.5°C.
profile.config.transform.REGEX.sourceFormat.label = State Format
profile.config.transform.REGEX.sourceFormat.description = Wie der State auf dem Channel vor der Umwandlung formatiert werden soll, z. B. %s oder %.1f °C (Standard ist %s).

# profile type

profile-type.transform.REGEX.label = REGEX
